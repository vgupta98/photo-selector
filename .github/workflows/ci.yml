name: CI

# The repo's only pass/fail gate. Release workflows run perf (release-perf.yml) and
# package the DMG (release.yml) but never run the test suite, so this is what keeps a
# red test out of `develop`. Because the release branch is `develop` plus a version-bump
# commit that only edits build.gradle.kts, a green `develop` means a green release by
# construction — so this gate lives here, as early as every change is observable.
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

# Read-only. This runs on untrusted PR code via `pull_request` (not `pull_request_target`),
# so it never sees repo secrets and the token cannot write — safe to run on fork PRs, which
# is the point: validate contributions before they land.
permissions:
  contents: read

# One in-flight run per branch / PR; a fresh push cancels the stale run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit & screenshot tests
    # ubuntu is the cheapest tier and fast to provision. The screenshot tests render
    # headlessly via createComposeRule() (offscreen Skiko, no display server), and they
    # assert on the semantics tree rather than golden pixels, so cross-platform font
    # rendering differences don't matter here. Only packageDmg needs macOS.
    runs-on: ubuntu-latest
    # Bound the blast radius of an untrusted PR: this job runs attacker-controlled code
    # (its tests, its build scripts), so cap wall-clock to deny a crypto-miner the default
    # 6-hour ceiling. The honest suite finishes in ~2 min; 20 leaves slack for a cold cache.
    timeout-minutes: 20
    steps:
      # Third-party-action versions are pinned to a full commit SHA, not a moving tag, so a
      # force-moved or compromised tag can't silently change what runs here. The `# vX.Y.Z`
      # comment is the human-readable version; bump both together when upgrading.
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Verify gradle-wrapper.jar against published Gradle checksums before ./gradlew ever
      # executes it. A PR can ship a poisoned wrapper jar that a reviewer skimming the diff
      # won't read; this catches that specific vector regardless of the sandbox.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Set up JDK 17 (Zulu)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: zulu
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run tests
        run: ./gradlew test

      # The suite is screenshot-based (build/screenshots/*.png). On failure, surface the
      # PNGs and the HTML report as an artifact so a red run is diagnosable from the Actions
      # tab without having to reproduce it locally.
      - name: Upload test report and screenshots
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-report
          path: |
            build/reports/tests/test
            build/screenshots
          if-no-files-found: ignore
          retention-days: 7
