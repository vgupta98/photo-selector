name: Deploy site

# The landing page tracks the stable release: it deploys from `main` (never
# `develop`), so the live site only changes when a release reaches `main`.
# Source lives in `site/` and is plain static files — no build step.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  # Manual re-deploy (e.g. first cut-over from the legacy branch source, or a
  # forced rebuild) without waiting for a content change.
  workflow_dispatch:

# Least privilege: read to check out, plus the two scopes Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time. Don't cancel an in-flight publish — let it finish so
# the site is never left half-updated.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Actions pinned to full commit SHAs, not moving tags — same policy as the
      # release pipeline. Bump the `# vX.Y.Z` comment and the SHA together.
      - name: Check out main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # `enablement: true` configures Pages to use the GitHub Actions source via
      # the API on first run, cutting over from the legacy branch source with no
      # manual Settings change.
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
