name: Release Perf

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: release-perf-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  perf:
    name: JMH perf vs main
    # Only fire for the release/vX.Y.Z branches that draft-release.yml opens.
    if: startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: release

      - name: Check out main baseline
        uses: actions/checkout@v4
        with:
          ref: main
          path: baseline

      - name: Set up JDK 17 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('release/**/*.gradle.kts', 'release/gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Detect harness on release branch
        id: release-check
        run: |
          if grep -q "me.champeau.jmh" release/build.gradle.kts 2>/dev/null; then
            echo "has-harness=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-harness=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Release branch has no JMH harness; skipping perf job."
          fi

      - name: Detect harness on main baseline
        id: baseline-check
        if: steps.release-check.outputs.has-harness == 'true'
        run: |
          if grep -q "me.champeau.jmh" baseline/build.gradle.kts 2>/dev/null; then
            echo "has-harness=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-harness=false" >> "$GITHUB_OUTPUT"
            echo "::notice::main does not have the JMH harness yet (first release after the harness lands). Will post release-branch absolute numbers without a diff."
          fi

      - name: Run JMH on release branch
        if: steps.release-check.outputs.has-harness == 'true'
        working-directory: release
        run: ./gradlew jmh

      - name: Run JMH on main (baseline)
        if: >-
          steps.release-check.outputs.has-harness == 'true' &&
          steps.baseline-check.outputs.has-harness == 'true'
        working-directory: baseline
        run: ./gradlew jmh

      - name: Build report
        id: report
        if: steps.release-check.outputs.has-harness == 'true'
        run: |
          {
            echo "## JMH perf — release vs \`main\`"
            echo
            echo "Runner: \`${{ runner.os }}\` on shared CI. Absolute scores are not portable across runners; the **delta** between baseline and feature is what to read. Treat deltas smaller than ~10% as noise on shared infra."
            echo
            if [ "${{ steps.baseline-check.outputs.has-harness }}" = "true" ]; then
              echo '```'
              release/tools/perf/diff.sh baseline/build/jmh/results.json release/build/jmh/results.json
              echo '```'
            else
              echo "_\`main\` does not yet have the JMH harness, so no baseline diff is possible. Showing release-branch absolute numbers._"
              echo
              echo '```'
              jq -r '.[] | "\(.benchmark | sub("com.vishalgupta.photoselector.perf."; "")): \(.primaryMetric.score | tonumber | . * 1000 | round / 1000) ± \(.primaryMetric.scoreError | tonumber | . * 1000 | round / 1000) \(.primaryMetric.scoreUnit)"' release/build/jmh/results.json
              echo '```'
            fi
            echo
            echo "<sub>Generated by \`.github/workflows/release-perf.yml\`. To reproduce locally: \`./gradlew jmh\` on each branch then \`tools/perf/diff.sh baseline.json feature.json\`.</sub>"
          } > report.md
          cat report.md

      - name: Comment on PR
        if: steps.release-check.outputs.has-harness == 'true'
        # Pinned to a SHA, not a tag, because tags are mutable — a compromised
        # third-party maintainer could move `@v2` to a malicious commit and
        # exfiltrate the GITHUB_TOKEN. Bump via Dependabot or by re-resolving
        # the latest v2.x tag: `gh api repos/marocchino/sticky-pull-request-comment/git/matching-refs/tags/v2`.
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: release-perf-jmh
          path: report.md
