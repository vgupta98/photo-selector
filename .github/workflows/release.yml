name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

# Least privilege: default every job to read-only, then elevate per job to exactly
# what it needs. The release job writes contents; the back-merge job only opens a PR.
permissions:
  contents: read

jobs:
  release:
    name: Tag, build DMG, publish GitHub Release
    # Same-repo guard: only publish for release branches that live in THIS
    # repo. A fork can name a branch "release/..." too, so the branch-name
    # convention alone is not a trust boundary — require the PR head to be
    # this repository before tagging/building/publishing anything.
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    # Tags, pushes, publishes the Release and deletes the release branch — all `contents`.
    # No pull-request API calls here, so no pull-requests scope.
    permissions:
      contents: write
    steps:
      # Actions are pinned to full commit SHAs, not moving tags: this job loads the
      # TAP_APP_PRIVATE_KEY (to mint a tap-scoped token), so a hijacked action tag must
      # never run here. The `# vX.Y.Z` comment is the readable version — bump both together.
      - name: Check out main at merge commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Read released version
        id: version
        run: |
          VERSION=$(grep -E '^version = "' build.gradle.kts | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Could not parse version from build.gradle.kts" >&2
            exit 1
          fi
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — aborting to avoid republishing." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - name: Find previous release tag
        id: prev
        run: |
          PREV=$(git tag --list 'v*' --sort=-v:refname | head -1 || true)
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"
          if [ -n "$PREV" ]; then
            echo "Previous tag: $PREV"
          else
            echo "No previous tag — this will be the first release."
          fi

      - name: Build release notes
        id: notes
        env:
          PREV_TAG: ${{ steps.prev.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${VERSION}"
          else
            RANGE=""
            COMPARE_URL="https://github.com/${{ github.repository }}/commits/v${VERSION}"
          fi

          render_section() {
            local heading="$1"; shift
            local pattern="$1"; shift
            local matches
            if [ -n "$RANGE" ]; then
              matches=$(git log --pretty=format:'- %s (%h)' "$RANGE" --grep="$pattern" --extended-regexp -- . ':(exclude).github/' || true)
            else
              matches=$(git log --pretty=format:'- %s (%h)' --grep="$pattern" --extended-regexp -- . ':(exclude).github/' || true)
            fi
            # Filter out the release bump commit from every section.
            matches=$(echo "$matches" | grep -v '^- chore(release): bump version to' || true)
            if [ -n "$matches" ]; then
              echo "### $heading" >> /tmp/notes.md
              echo "$matches" >> /tmp/notes.md
              echo >> /tmp/notes.md
            fi
          }

          echo "## What's Changed" > /tmp/notes.md
          echo >> /tmp/notes.md

          render_section "Breaking Changes" '^[a-zA-Z]+(\([^)]+\))?!:'
          render_section "Features"         '^feat(\([^)]+\))?:'
          render_section "Bug Fixes"        '^fix(\([^)]+\))?:'
          render_section "Documentation"    '^docs(\([^)]+\))?:'

          if [ -n "$RANGE" ]; then
            OTHER=$(git log --pretty=format:'- %s (%h)' "$RANGE" --extended-regexp \
              --invert-grep \
              --grep='^[a-zA-Z]+(\([^)]+\))?!:' \
              --grep='^feat(\([^)]+\))?:' \
              --grep='^fix(\([^)]+\))?:' \
              --grep='^docs(\([^)]+\))?:' \
              --grep='^chore\(release\):' -- . ':(exclude).github/' || true)
          else
            OTHER=$(git log --pretty=format:'- %s (%h)' --extended-regexp \
              --invert-grep \
              --grep='^[a-zA-Z]+(\([^)]+\))?!:' \
              --grep='^feat(\([^)]+\))?:' \
              --grep='^fix(\([^)]+\))?:' \
              --grep='^docs(\([^)]+\))?:' \
              --grep='^chore\(release\):' -- . ':(exclude).github/' || true)
          fi
          if [ -n "$OTHER" ]; then
            echo "### Other Changes" >> /tmp/notes.md
            echo "$OTHER" >> /tmp/notes.md
            echo >> /tmp/notes.md
          fi

          {
            echo "## Install"
            echo
            echo "Download \`Rhenium-${VERSION}.dmg\` from the assets below. First launch requires the macOS Gatekeeper override documented in the README."
            echo
            echo "## Full Changelog"
            echo
            echo "$COMPARE_URL"
          } >> /tmp/notes.md

          cat /tmp/notes.md

      - name: Build DMG
        run: ./gradlew --no-daemon packageReleaseDmg

      - name: Locate DMG artifact
        id: artifact
        run: |
          DMG=$(find build/compose/binaries/main-release -name '*.dmg' | head -1)
          if [ -z "$DMG" ] || [ ! -f "$DMG" ]; then
            echo "No DMG produced by packageReleaseDmg" >&2
            exit 1
          fi
          echo "path=$DMG" >> "$GITHUB_OUTPUT"
          echo "Built: $DMG"

      - name: Create tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          DMG: ${{ steps.artifact.outputs.path }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/notes.md \
            "$DMG"

      - name: Mint a scoped, short-lived token for the tap
        id: tap-token
        # GitHub App installation token (app: rhenium-tap-bumper) scoped to contents:write on ONLY
        # homebrew-tap and expiring in ~1h — replaces the non-expiring read-write SSH deploy key.
        # SHA-pinned like every other action here; bump the `# vX.Y.Z` and SHA together.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: vgupta98
          repositories: homebrew-tap

      - name: Bump Homebrew cask and update feed
        env:
          # Short-lived GitHub App installation token minted above: contents:write on only
          # homebrew-tap. The default GITHUB_TOKEN can't push to another repo; this can, and
          # nothing else — and it expires in ~1h, so a leak is not a standing key.
          TOKEN: ${{ steps.tap-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
          DMG: ${{ steps.artifact.outputs.path }}
          REPO: ${{ github.repository }}
        run: |
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          git clone "https://x-access-token:${TOKEN}@github.com/vgupta98/homebrew-tap.git" tap
          CASK=tap/Casks/rhenium.rb
          # macOS runner: BSD sed needs the '' empty-suffix argument for -i.
          sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK"
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" "$CASK"
          # Update the in-app update feed the same tap repo hosts. The release *facts*
          # (latest / dmgUrl / notesUrl) are always rewritten. A *new* latest also resets the
          # staging policy — rollout back to full, mandatory back off — so a partial wave or a
          # kill switch (rollout: 0) set on the PREVIOUS version can't silently throttle this one,
          # and the fix for a killed build ships to everyone instead of inheriting its rollout: 0.
          # Re-stage by hand on the feed after release if you want a partial wave. The floor fields
          # (minimumVersion / minOS) are version-spanning policy and left untouched. A re-run for
          # the same version preserves any manual staging (idempotent).
          # Feed path must match updateManifestUrl in build.gradle.kts.
          mkdir -p tap/rhenium
          python3 - "tap/rhenium/update-manifest.json" "$VERSION" "$REPO" <<'PY'
          import json, os, sys
          path, version, repo = sys.argv[1], sys.argv[2], sys.argv[3]
          data = {}
          if os.path.exists(path):
              with open(path) as f:
                  data = json.load(f)
          new_release = data.get("latest") != version
          data["latest"] = version
          data["dmgUrl"] = f"https://github.com/{repo}/releases/download/v{version}/Rhenium-{version}.dmg"
          data["notesUrl"] = f"https://github.com/{repo}/releases/tag/v{version}"
          if new_release:
              data["rollout"] = 1.0
              data["mandatory"] = False
          else:
              data.setdefault("rollout", 1.0)
              data.setdefault("mandatory", False)
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PY
          cd tap
          if [ -z "$(git status --porcelain)" ]; then
            echo "Cask and feed already at ${VERSION} — nothing to bump."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/rhenium.rb rhenium/update-manifest.json
          git commit -m "Update rhenium to ${VERSION}"
          git push

      - name: Delete release branch
        if: success()
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # The PR merge may already have deleted the branch if the repo has
          # "Automatically delete head branches" enabled; treat that as success.
          if git ls-remote --exit-code --heads origin "$HEAD_REF" >/dev/null; then
            git push origin --delete "$HEAD_REF"
          else
            echo "Branch $HEAD_REF already gone — nothing to delete."
          fi

  back-merge:
    name: Back-merge main into develop
    needs: release
    runs-on: ubuntu-latest
    # Only opens a PR: read to check out, pull-requests to create it. No contents write.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          fetch-depth: 0

      - name: Open back-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git fetch origin develop
          if git diff --quiet origin/develop..main -- .; then
            echo "main and develop are identical — no back-merge needed."
            exit 0
          fi

          # Don't create a duplicate if one already exists.
          EXISTING=$(gh pr list --base develop --head main --state open --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            echo "Back-merge PR #${EXISTING} already open — skipping."
            exit 0
          fi

          gh pr create \
            --base develop \
            --head main \
            --title "chore: back-merge main after v${VERSION} release" \
            --body "Automated back-merge of \`main\` into \`develop\` after the v${VERSION} release. Syncs the version bump in \`build.gradle.kts\` so the next Draft Release computes the correct version."
