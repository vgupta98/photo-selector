name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Tag, build DMG, publish GitHub Release
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out main at merge commit
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read released version
        id: version
        run: |
          VERSION=$(grep -E '^version = "' build.gradle.kts | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Could not parse version from build.gradle.kts" >&2
            exit 1
          fi
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — aborting to avoid republishing." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - name: Find previous release tag
        id: prev
        run: |
          PREV=$(git tag --list 'v*' --sort=-v:refname | head -1 || true)
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"
          if [ -n "$PREV" ]; then
            echo "Previous tag: $PREV"
          else
            echo "No previous tag — this will be the first release."
          fi

      - name: Build release notes
        id: notes
        env:
          PREV_TAG: ${{ steps.prev.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${VERSION}"
          else
            RANGE=""
            COMPARE_URL="https://github.com/${{ github.repository }}/commits/v${VERSION}"
          fi

          render_section() {
            local heading="$1"; shift
            local pattern="$1"; shift
            local matches
            if [ -n "$RANGE" ]; then
              matches=$(git log --pretty=format:'- %s (%h)' "$RANGE" --grep="$pattern" --extended-regexp -- . ':(exclude).github/' || true)
            else
              matches=$(git log --pretty=format:'- %s (%h)' --grep="$pattern" --extended-regexp -- . ':(exclude).github/' || true)
            fi
            # Filter out the release bump commit from every section.
            matches=$(echo "$matches" | grep -v '^- chore(release): bump version to' || true)
            if [ -n "$matches" ]; then
              echo "### $heading" >> /tmp/notes.md
              echo "$matches" >> /tmp/notes.md
              echo >> /tmp/notes.md
            fi
          }

          echo "## What's Changed" > /tmp/notes.md
          echo >> /tmp/notes.md

          render_section "Breaking Changes" '^[a-zA-Z]+(\([^)]+\))?!:'
          render_section "Features"         '^feat(\([^)]+\))?:'
          render_section "Bug Fixes"        '^fix(\([^)]+\))?:'
          render_section "Documentation"    '^docs(\([^)]+\))?:'

          if [ -n "$RANGE" ]; then
            OTHER=$(git log --pretty=format:'- %s (%h)' "$RANGE" --extended-regexp \
              --invert-grep \
              --grep='^[a-zA-Z]+(\([^)]+\))?!:' \
              --grep='^feat(\([^)]+\))?:' \
              --grep='^fix(\([^)]+\))?:' \
              --grep='^docs(\([^)]+\))?:' \
              --grep='^chore\(release\):' -- . ':(exclude).github/' || true)
          else
            OTHER=$(git log --pretty=format:'- %s (%h)' --extended-regexp \
              --invert-grep \
              --grep='^[a-zA-Z]+(\([^)]+\))?!:' \
              --grep='^feat(\([^)]+\))?:' \
              --grep='^fix(\([^)]+\))?:' \
              --grep='^docs(\([^)]+\))?:' \
              --grep='^chore\(release\):' -- . ':(exclude).github/' || true)
          fi
          if [ -n "$OTHER" ]; then
            echo "### Other Changes" >> /tmp/notes.md
            echo "$OTHER" >> /tmp/notes.md
            echo >> /tmp/notes.md
          fi

          {
            echo "## Install"
            echo
            echo "Download \`PhotoSelector-${VERSION}.dmg\` from the assets below. First launch requires the macOS Gatekeeper override documented in the README."
            echo
            echo "## Full Changelog"
            echo
            echo "$COMPARE_URL"
          } >> /tmp/notes.md

          cat /tmp/notes.md

      - name: Build DMG
        run: ./gradlew --no-daemon packageDmg

      - name: Locate DMG artifact
        id: artifact
        run: |
          DMG=$(find build/compose/binaries -name '*.dmg' | head -1)
          if [ -z "$DMG" ] || [ ! -f "$DMG" ]; then
            echo "No DMG produced by packageDmg" >&2
            exit 1
          fi
          echo "path=$DMG" >> "$GITHUB_OUTPUT"
          echo "Built: $DMG"

      - name: Create tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          DMG: ${{ steps.artifact.outputs.path }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/notes.md \
            "$DMG"

      - name: Bump Homebrew cask
        env:
          # SSH deploy key with write access to vgupta98/homebrew-tap. A deploy
          # key is scoped to that single repo; the default GITHUB_TOKEN can't
          # push to a different repo.
          DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          DMG: ${{ steps.artifact.outputs.path }}
        run: |
          # Load the deploy key into a throwaway ssh-agent for this step.
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          eval "$(ssh-agent -s)"
          ssh-add - <<< "$DEPLOY_KEY"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          git clone git@github.com:vgupta98/homebrew-tap.git tap
          CASK=tap/Casks/photo-selector.rb
          # macOS runner: BSD sed needs the '' empty-suffix argument for -i.
          sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK"
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" "$CASK"
          cd tap
          if git diff --quiet; then
            echo "Cask already at ${VERSION} — nothing to bump."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/photo-selector.rb
          git commit -m "Update photo-selector to ${VERSION}"
          git push

      - name: Delete release branch
        if: success()
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # The PR merge may already have deleted the branch if the repo has
          # "Automatically delete head branches" enabled; treat that as success.
          if git ls-remote --exit-code --heads origin "$HEAD_REF" >/dev/null; then
            git push origin --delete "$HEAD_REF"
          else
            echo "Branch $HEAD_REF already gone — nothing to delete."
          fi

  back-merge:
    name: Back-merge main into develop
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Open back-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git fetch origin develop
          if git diff --quiet origin/develop..main -- .; then
            echo "main and develop are identical — no back-merge needed."
            exit 0
          fi

          # Don't create a duplicate if one already exists.
          EXISTING=$(gh pr list --base develop --head main --state open --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            echo "Back-merge PR #${EXISTING} already open — skipping."
            exit 0
          fi

          gh pr create \
            --base develop \
            --head main \
            --title "chore: back-merge main after v${VERSION} release" \
            --body "Automated back-merge of \`main\` into \`develop\` after the v${VERSION} release. Syncs the version bump in \`build.gradle.kts\` so the next Draft Release computes the correct version."
